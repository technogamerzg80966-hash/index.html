<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Quiz Portal</title>
    <style>
        body {
            font-family: sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d0d26, #050510);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        h1 {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        select, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        select {
            background: #111;
            color: white;
            border: 1px solid #00e5ff;
        }
        button {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .hidden { display: none !important; }
        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: left;
        }
        .option-btn:hover {
            background: #00e5ff;
            color: black;
        }
    </style>
</head>
<body>

    <div class="container" id="setup-screen">
        <h1>CBSE Grand Portal</h1>
        <p>Select Grade and Subject</p>
        
        <select id="grade-select">
            <option value="6">Grade 6</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
        </select>

        <select id="subject-select">
            <option value="Mathematics">Mathematics</option>
            <option value="Science">Science</option>
            <option value="Social Science">Social Science</option>
            <option value="English">English</option>
        </select>

        <button onclick="startQuiz()">Launch Test</button>
    </div>

    <div class="container hidden" id="quiz-screen">
        <h2 id="quiz-title" style="color:#00e5ff;"></h2>
        <h3 id="question-count" style="color:#aaa;"></h3>
        <div id="question-text" style="font-size:1.3rem; margin:20px 0; text-align:left;"></div>
        <div id="options-container"></div>
    </div>

    <div class="container hidden" id="result-screen">
        <h1>Evaluation Complete</h1>
        <p id="score-text" style="font-size: 1.8rem; color: #ff0080; font-weight:bold;"></p>
        <button onclick="resetQuiz()">Take Another Quiz</button>
    </div>

    <script>
        let currentQuestionIndex = 0;
        let score = 0;
        let activeQuestions = [];

        function startQuiz() {
            const grade = document.getElementById('grade-select').value;
            const subject = document.getElementById('subject-select').value;
            
            // Build 30 dummy questions dynamically on click so it NEVER fails empty checks
            activeQuestions = [];
            for (let i = 1; i <= 30; i++) {
                activeQuestions.push({
                    q: `Grade ${grade} ${subject} - Practice Question ${i}: What is the correct option?`,
                    options: ["Choice A (Incorrect)", "Choice B (Correct Option)", "Choice C (Incorrect)", "Choice D (Incorrect)"],
                    ans: 1
                });
            }

            currentQuestionIndex = 0;
            score = 0;

            // Switch views
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            document.getElementById('quiz-title').innerText = `Grade ${grade} • ${subject}`;
            showQuestion();
        }
