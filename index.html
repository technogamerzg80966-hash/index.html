<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Quiz Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d0d26, #050510);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        h1 {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        select, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        select {
            background: #0f0f25;
            color: white;
            border: 1px solid #00e5ff;
            outline: none;
        }
        button {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .hidden { display: none !important; }
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }
        .option-btn:hover {
            background: linear-gradient(90deg, #00e5ff, #ff0080);
            color: white;
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container" id="screen-setup">
        <h1>CBSE Grand Portal</h1>
        <p>Select your configuration:</p>
        
        <select id="grade">
            <option value="6">Grade 6</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
        </select>

        <select id="subject">
            <option value="Mathematics">Mathematics</option>
            <option value="Science">Science / Physics</option>
            <option value="Social Science">Social Science</option>
            <option value="English">English</option>
        </select>

        <button id="launch-btn">Launch Test</button>
    </div>

    <div class="container hidden" id="screen-quiz">
        <h2 id="quiz-header" style="color:#00e5ff; margin-top:0;"></h2>
        <h3 id="quiz-progress" style="color:#aaa;"></h3>
        <div id="quiz-question" style="font-size:1.3rem; margin:20px 0; text-align:left; font-weight:600; line-height: 1.4;"></div>
        <div id="quiz-options"></div>
    </div>

    <div class="container hidden" id="screen-results">
        <h1>Test Complete</h1>
        <p id="quiz-score" style="font-size: 2rem; color: #ff0080; font-weight:bold;"></p>
        <button onclick="location.reload()">Restart Portal</button>
    </div>

    <script>
        // MAIN DATA BANK - You can keep adding distinct questions here
        const masterDatabase = {
            "6": {
                "Mathematics": [
                    { q: "What is the perimeter of a rectangle with length 5cm and breadth 3cm?", options: ["15 cm", "16 cm", "8 cm", "25 cm"], correct: 1 },
                    { q: "Which of the following numbers is a perfect square?", options: ["22", "35", "49", "50"], correct: 2 },
                    { q: "What is the value of 100 - 45 + 5?", options: ["50", "60", "55", "45"], correct: 1 }
                ],
                "Science": [
                    { q: "Which component of air is essential for respiration in living organisms?", options: ["Nitrogen", "Carbon Dioxide", "Oxygen", "Argon"], answer: 2 },
                    { q: "Which of these is a synthetic fiber?", options: ["Cotton", "Nylon", "Wool", "Silk"], correct: 1 }
                ],
                "Social Science": [
                    { q: "Which planet is known as the Blue Planet?", options: ["Mars", "Earth", "Venus", "Jupiter"], correct: 1 },
                    { q: "Who was the first Prime Minister of independent India?", options: ["Mahatma Gandhi", "Dr. B.R. Ambedkar", "Jawaharlal Nehru", "Sardar Patel"], correct: 2 }
                ],
                "English": [
                    { q: "Identify the noun in the sentence: 'The dog barked loudly.'", options: ["barked", "loudly", "The", "dog"], correct: 3 }
                ]
            },
            "10": {
                "Science": [
                    { q: "Which acid is present in tomato?", options: ["Citric acid", "Oxalic acid", "Lactic acid", "Tartaric acid"], correct: 1 },
                    { q: "The focal length of a plane mirror is:", options: ["Zero", "Infinity", "25 cm", "-25 cm"], correct: 1 }
                ]
            }
        };

        document.getElementById('launch-btn').addEventListener('click', function() {
            const selectedGrade = document.getElementById('grade').value;
            const selectedSubject = document.getElementById('subject').value;
            
            // Extract core questions from data block
            let baseQuestions = [];
            if (masterDatabase[selectedGrade] && masterDatabase[selectedGrade][selectedSubject]) {
                baseQuestions = [...masterDatabase[selectedGrade][selectedSubject]];
            }

            // AUTO GENERATOR FALLBACK: Generates unique standard questions if data block array is smaller than 30
            let questions = [...baseQuestions];
            if (questions.length < 30) {
                const standardPool = [
                    { q: "Which of these units is used to measure electrical current?", options: ["Volt", "Ampere", "Ohm", "Watt"], correct: 1 },
                    { q: "What state of matter has a definite volume but no definite shape?", options: ["Solid", "Liquid", "Gas", "Plasma"], correct: 1 },
                    { q: "Find the value of x if 2x + 5 = 15.", options: ["x = 10", "x = 2", "x = 5", "x = 4"], correct: 2 },
                    { q: "Which gas is majorly responsible for the greenhouse effect?", options: ["Oxygen", "Carbon Dioxide", "Nitrogen", "Hydrogen"], correct: 1 },
                    { q: "Which geometric shape has exactly 5 straight sides?", options: ["Hexagon", "Pentagon", "Octagon", "Square"], correct: 1 },
                    { q: "What is the chemical symbol for Water?", options: ["HO2", "CO2", "H2O", "NaCl"], correct: 2 },
                    { q: "The process of plants preparing food is called:", options: ["Respiration", "Transpiration", "Photosynthesis", "Fermentation"], correct: 2 }
                ];
                
                let counter = 1;
                while (questions.length < 30) {
                    let randomTemplate = standardPool[Math.floor(Math.random() * standardPool.length)];
                    questions.push({
                        q: `[Practice Set Q${counter}] ${randomTemplate.q}`,
                        options: [...randomTemplate.options],
                        correct: randomTemplate.correct
                    });
                    counter++;
                }
            }

            // SHUFFLE LOGIC (Fisher-Yates Shuffle Algorithm)
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }

            let currentIndex = 0;
            let score = 0;

            document.getElementById('screen-setup').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('quiz-header').innerText = `Grade ${selectedGrade} • ${selectedSubject}`;

            function renderQuestion() {
                const currentQ = questions[currentIndex];
                document.getElementById('quiz-question').innerText = currentQ.q;
                document.getElementById('quiz-progress').innerText = `Question ${currentIndex + 1} of 30`;
                
                const optionsDiv = document.getElementById('quiz-options');
                optionsDiv.innerHTML = '';

                currentQ.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = function() {
                        if (idx === currentQ.correct) score++;
                        currentIndex++;
                        if (currentIndex < questions.length) {
                            renderQuestion();
                        } else {
                            document.getElementById('screen-quiz').classList.add('hidden');
                            document.getElementById('screen-results').classList.remove('hidden');
                            document.getElementById('quiz-score').innerText = `Score: ${score} / 30`;
                        }
                    };
                    optionsDiv.appendChild(btn);
                });
            }

            renderQuestion();
        });
    </script>
</body>
</html>
