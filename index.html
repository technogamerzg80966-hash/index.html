<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate School Quiz</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.quiz-container{
background:rgba(255,255,255,0.95);
width:700px;
max-width:95%;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-weight:bold;
font-size:18px;
}

.question{
font-size:24px;
margin-bottom:20px;
}

.answers button{
width:100%;
padding:15px;
margin:8px 0;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#e9ecef;
transition:0.2s;
}

.answers button:hover{
background:#d0d7de;
}

.correct{
background:#4CAF50 !important;
color:white;
}

.wrong{
background:#f44336 !important;
color:white;
}

#nextBtn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#0078ff;
color:white;
font-size:18px;
cursor:pointer;
display:none;
}

#result{
text-align:center;
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>🏆 Ultimate School Quiz 🏆</h1>

<div class="top-bar">
<span id="questionNumber">Question 1/15</span>
<span id="score">Score: 0</span>
</div>

<div id="quiz">

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

<button id="nextBtn">Next Question</button>

</div>

<div id="result"></div>

</div>

<script>

const questions = [

{
question:"What is 8 × 7 ?",
answers:["54","56","64","72"],
correct:1
},

{
question:"What is 12 × 12 ?",
answers:["124","144","154","134"],
correct:1
},

{
question:"What is 100 ÷ 4 ?",
answers:["20","25","40","50"],
correct:1
},

{
question:"Which planet is called the Red Planet?",
answers:["Mars","Earth","Venus","Jupiter"],
correct:0
},

{
question:"What gas do plants absorb?",
answers:["Oxygen","Carbon Dioxide","Nitrogen","Hydrogen"],
correct:1
},

{
question:"What is the largest planet?",
answers:["Earth","Mars","Saturn","Jupiter"],
correct:3
},

{
question:"Which word is a noun?",
answers:["Run","Happy","School","Quickly"],
correct:2
},

{
question:"Choose the correct spelling.",
answers:["Becuse","Because","Beacause","Becoz"],
correct:1
},

{
question:"What is the opposite of Hot?",
answers:["Warm","Cold","Heat","Steam"],
correct:1
},

{
question:"What is the capital of France?",
answers:["Berlin","Paris","Rome","Madrid"],
correct:1
},

{
question:"Which continent is Egypt in?",
answers:["Europe","Asia","Africa","Australia"],
correct:2
},

{
question:"Which ocean is the largest?",
answers:["Indian","Atlantic","Pacific","Arctic"],
correct:2
},

{
question:"Who discovered America?",
answers:["Newton","Columbus","Einstein","Tesla"],
correct:1
},

{
question:"Who built the pyramids?",
answers:["Romans","Greeks","Egyptians","Chinese"],
correct:2
},

{
question:"In which year did World War II end?",
answers:["1945","1940","1939","1950"],
correct:0
}

];

let currentQuestion = 0;
let score = 0;

const question = document.getElementById("question");
const answers = document.getElementById("answers");
const scoreText = document.getElementById("score");
const questionNumber = document.getElementById("questionNumber");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion(){

let q = questions[currentQuestion];

question.innerText = q.question;

questionNumber.innerText =
`Question ${currentQuestion+1}/${questions.length}`;

answers.innerHTML = "";

q.answers.forEach((answer,index)=>{

let btn = document.createElement("button");

btn.innerText = answer;

btn.onclick = ()=>checkAnswer(index);

answers.appendChild(btn);

});

nextBtn.style.display="none";
}

function checkAnswer(selected){

let buttons = answers.querySelectorAll("button");

buttons.forEach(btn=>btn.disabled=true);

if(selected===questions[currentQuestion].correct){

buttons[selected].classList.add("correct");

score++;

scoreText.innerText="Score: "+score;

}
else{

buttons[selected].classList.add("wrong");

buttons[questions[currentQuestion].correct]
.classList.add("correct");

}

nextBtn.style.display="block";
}

nextBtn.onclick=()=>{

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}
else{

document.getElementById("quiz").style.display="none";

document.getElementById("result").innerHTML=
`🏆 Quiz Finished!<br><br>Your Score: ${score}/${questions.length}`;

}

};

loadQuestion();

</script>

</body>
</html>
